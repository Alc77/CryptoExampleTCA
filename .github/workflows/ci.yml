name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Create placeholder xcconfig
        run: echo "COINGECKO_API_KEY = CI_PLACEHOLDER" > CoinGecko.xcconfig

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme CryptoExampleTCA -project CryptoExampleTCA.xcodeproj

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project CryptoExampleTCA.xcodeproj \
            -scheme CryptoExampleTCA \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.4' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}
