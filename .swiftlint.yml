# SwiftLint configuration for CryptoExampleTCA
# Tuned for TCA patterns (longer reducer bodies, deeper nesting)

excluded:
  - .build
  - .swiftpm
  - DerivedData

# TCA reducers naturally produce longer types and deeper nesting
type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

nesting:
  type_level: 3
  function_level: 3

# Identifier length tuned for TCA naming conventions
identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - x
    - y
    - i

disabled_rules:
  - trailing_comma
  - force_cast
  - todo
  - blanket_disable_command

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture
  - vertical_whitespace_closing_braces
